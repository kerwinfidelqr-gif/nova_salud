version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Conectamos tu app al contenedor de MongoDB
      - MONGODB_URI=mongodb://mongo:27017/novasalud
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: